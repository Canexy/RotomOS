[platformio]
default_envs = emulator_64bits

; ── EMULADOR PC ──────────────────────────────────────────────────────────────
[env:emulator_64bits]
platform = native@^1.1.3
extra_scripts = support/sdl2_build_extra.py, pre:tools/auto_sprites.py
build_flags =
    -D LV_CONF_INCLUDE_SIMPLE
    -I include
    -I C:/msys64/mingw64/include
    -L C:/msys64/mingw64/lib
    -D USE_SDL
    -D MONITOR_HOR_RES=466
    -D MONITOR_VER_RES=466
lib_deps =
    lvgl/lvgl @ 8.3.11

; ── HARDWARE REAL: Waveshare ESP32-S3-Touch-AMOLED-1.75C ─────────────────────
[env:waveshare-175c]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
; OPI PSRAM (8MB) + QIO Flash (32MB en la 1.75C)
board_build.arduino.memory_type = qio_opi
; Partición grande: más espacio para sprites y código
board_build.partitions = huge_app.csv
build_flags =
    -D ESP32
    -D WAVESHARE_175C
    -D BOARD_HAS_PSRAM
    -D LV_CONF_INCLUDE_SIMPLE
    -I include
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    lvgl/lvgl @ 8.3.11
    lovyan03/LovyanGFX @ ^1.1.16
    adafruit/RTClib @ ^2.1.4